<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="1620" viewBox="0 0 680 1620" xmlns="http://www.w3.org/2000/svg"
  style="background:#ffffff; font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;">

<!-- ===== 矢印を描くマクロ的な定義なし版 =====
     全ての矢印を line + polygon で直接描く -->

<!-- 凡例 -->
<rect x="30" y="10" width="620" height="28" rx="4" fill="none" stroke="#CCCCCC" stroke-width="0.5"/>
<rect x="38" y="17" width="11" height="11" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="55" y="27" font-size="11" fill="#534AB7">センタースタッフ</text>
<rect x="160" y="17" width="11" height="11" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="177" y="27" font-size="11" fill="#0F6E56">Bコーチ</text>
<rect x="242" y="17" width="11" height="11" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="259" y="27" font-size="11" fill="#854F0B">クライアント</text>
<rect x="360" y="17" width="11" height="11" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="377" y="27" font-size="11" fill="#993C1D">判断</text>
<rect x="420" y="17" width="11" height="11" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="437" y="27" font-size="11" fill="#5F5E5A">開始/終了</text>

<!-- ===== START ===== -->
<rect x="255" y="50" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">スタート</text>

<!-- 矢印: START → STEP1 -->
<line x1="340" y1="84" x2="340" y2="100" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,104 336,96 344,96" fill="#555555"/>

<!-- ===== STEP1: JOB作成 ===== -->
<rect x="210" y="104" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="125" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">① JOB作成</text>
<text x="340" y="143" font-size="11" text-anchor="middle" fill="#534AB7">イベント名・期間・クライアント人数を設定</text>
<!-- 役割ラベル -->
<text x="90" y="124" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="138" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="118" y1="130" x2="208" y2="130" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP1 → STEP2 -->
<line x1="340" y1="156" x2="340" y2="172" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,176 336,168 344,168" fill="#555555"/>

<!-- ===== STEP2: コーチ入力リンク発行 ===== -->
<rect x="210" y="176" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="197" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">② コーチ入力リンクを発行・送付</text>
<text x="340" y="215" font-size="11" text-anchor="middle" fill="#534AB7">GAS WebアプリURLをBコーチチームに送付</text>

<!-- 矢印: STEP2 → STEP3 -->
<line x1="340" y1="228" x2="340" y2="244" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,248 336,240 344,240" fill="#555555"/>

<!-- ===== STEP3: コーチ日程入力 ===== -->
<rect x="210" y="248" width="260" height="90" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="340" y="269" font-size="13" font-weight="bold" text-anchor="middle" fill="#085041">③ コーチが対応日程を入力</text>
<text x="340" y="287" font-size="11" text-anchor="middle" fill="#0F6E56">名前選択・日付・開始時間を入力</text>
<text x="340" y="303" font-size="11" text-anchor="middle" fill="#0F6E56">終了時間は自動計算（+75分）</text>
<text x="340" y="319" font-size="11" text-anchor="middle" fill="#0F6E56">→ 入力結果を本人にメール自動送信</text>
<text x="340" y="330" font-size="10" text-anchor="middle" fill="#0F6E56">（メールアドレスはコーチマスタに事前登録）</text>
<!-- 役割ラベル -->
<text x="592" y="278" font-size="11" text-anchor="middle" fill="#AAAAAA">Bコーチ</text>
<text x="592" y="292" font-size="11" text-anchor="middle" fill="#AAAAAA">チーム全員</text>
<line x1="472" y1="285" x2="562" y2="285" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP3 → 判断1 -->
<line x1="340" y1="338" x2="340" y2="356" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,360 336,352 344,352" fill="#555555"/>

<!-- ===== 判断1: 入力期間内? ===== -->
<polygon points="340,360 422,400 340,440 258,400" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="394" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">入力期間内？</text>
<text x="340" y="410" font-size="10" text-anchor="middle" fill="#993C1D">（タイマー）</text>

<!-- 矢印: 判断1 Yes → STEP4 -->
<line x1="340" y1="440" x2="340" y2="468" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,472 336,464 344,464" fill="#555555"/>
<text x="350" y="459" font-size="11" fill="#555555">Yes</text>

<!-- 矢印: 判断1 No → STEP3（戻り） -->
<text x="204" y="386" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・延長）</text>
<line x1="258" y1="400" x2="178" y2="400" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="400" x2="178" y2="293" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="293" x2="208" y2="293" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,293 202,289 202,297" fill="#BBBBBB"/>

<!-- ===== STEP4: 日程確定 ===== -->
<rect x="210" y="472" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="493" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">④ コーチング日程を確定</text>
<text x="340" y="511" font-size="11" text-anchor="middle" fill="#534AB7">必要枠数に絞り込み・手動調整</text>
<text x="340" y="527" font-size="11" text-anchor="middle" fill="#534AB7">コーチ数 × ceil（人数 ÷ コーチ数）</text>
<!-- 役割ラベル -->
<text x="90" y="496" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="510" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="118" y1="503" x2="208" y2="503" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP4 → STEP5 -->
<line x1="340" y1="538" x2="340" y2="554" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,558 336,550 344,550" fill="#555555"/>

<!-- ===== STEP5: 予約リンク発行 ===== -->
<rect x="210" y="558" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="579" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑤ クライアントに予約リンク送付</text>
<text x="340" y="597" font-size="11" text-anchor="middle" fill="#534AB7">空き枠のみ表示（日時のみ・コーチ名なし）</text>
<text x="340" y="613" font-size="11" text-anchor="middle" fill="#534AB7">LN・氏名・メールアドレスを入力</text>

<!-- 矢印: STEP5 → STEP6 -->
<line x1="340" y1="624" x2="340" y2="640" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,644 336,636 344,636" fill="#555555"/>

<!-- ===== STEP6: クライアント予約 ===== -->
<rect x="210" y="644" width="260" height="164" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="664" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">⑥ クライアントが日程を予約</text>
<text x="340" y="681" font-size="11" text-anchor="middle" fill="#854F0B">空き枠を選択（予約者名を全員に表示）</text>
<text x="340" y="696" font-size="10" text-anchor="middle" fill="#854F0B">本人確認：氏名＋メールアドレスで照合</text>
<text x="340" y="713" font-size="11" font-weight="bold" text-anchor="middle" fill="#633806">【確定】→ 仮ロック中（10分で自動解除）</text>
<text x="340" y="728" font-size="11" font-weight="bold" text-anchor="middle" fill="#D4720A">【送信】→「予約」（オレンジ）枠に名前を表示</text>
<text x="340" y="744" font-size="10" text-anchor="middle" fill="#854F0B">受講者同士でLINE等で調整・合意して入れ替え可</text>
<text x="340" y="759" font-size="11" font-weight="bold" text-anchor="middle" fill="#1A7A5E">【取消】→ 自分の予約のみ解除（空きに戻す）</text>
<text x="340" y="773" font-size="10" text-anchor="middle" fill="#854F0B">　　　　 エントリー期間中は何度でも変更可</text>
<text x="592" y="668" font-size="11" text-anchor="middle" fill="#AAAAAA">LV受講生</text>
<text x="592" y="682" font-size="11" text-anchor="middle" fill="#AAAAAA">（クライアント）</text>
<line x1="472" y1="675" x2="562" y2="675" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP6 → 判断2 -->
<line x1="340" y1="808" x2="340" y2="830" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,834 336,826 344,826" fill="#555555"/>

<!-- ===== 判断2: 枠は空き? ===== -->
<polygon points="340,834 422,874 340,914 258,874" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="868" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">枠は空き？</text>
<text x="340" y="884" font-size="10" text-anchor="middle" fill="#993C1D">（排他制御・同時アクセス対策）</text>

<!-- 矢印: 判断2 Yes → STEP6b -->
<line x1="340" y1="914" x2="340" y2="942" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,946 336,938 344,938" fill="#555555"/>
<text x="350" y="933" font-size="11" fill="#555555">Yes（確定）</text>

<!-- 矢印: 判断2 No → STEP6（戻り） -->
<text x="466" y="861" font-size="10" fill="#BBBBBB">No（衝突）</text>
<text x="466" y="875" font-size="10" fill="#BBBBBB">→ 画面に通知</text>
<line x1="422" y1="874" x2="502" y2="820" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="502" y1="874" x2="502" y2="681" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="502" y1="681" x2="472" y2="681" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="470,681 478,677 478,685" fill="#BBBBBB"/>

<!-- ===== STEP6b: 完了メール ===== -->
<rect x="210" y="946" width="260" height="52" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="967" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">⑥′ 予約完了メールを自動送信</text>
<text x="340" y="985" font-size="11" text-anchor="middle" fill="#854F0B">入力メールアドレス宛に自動送信（GAS）</text>

<!-- 矢印: STEP6b → 判断3 -->
<line x1="340" y1="998" x2="340" y2="1014" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1018 336,1010 344,1010" fill="#555555"/>

<!-- ===== 判断3: 予約期間内? ===== -->
<polygon points="340,1018 422,1058 340,1098 258,1058" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="1052" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">予約期間内？</text>
<text x="340" y="1068" font-size="10" text-anchor="middle" fill="#993C1D">（タイマー）</text>

<!-- 矢印: 判断3 Yes → 判断4 -->
<line x1="340" y1="1098" x2="340" y2="1126" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1130 336,1122 344,1122" fill="#555555"/>
<text x="350" y="1117" font-size="11" fill="#555555">Yes</text>

<!-- 矢印: 判断3 No → STEP6（戻り） -->
<text x="204" y="1044" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・延長）</text>
<line x1="258" y1="1058" x2="170" y2="1058" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="170" y1="1058" x2="170" y2="681" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="170" y1="681" x2="208" y2="681" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,681 202,677 202,685" fill="#BBBBBB"/>

<!-- ===== 判断4: 全員完了? ===== -->
<polygon points="340,1130 422,1170 340,1210 258,1170" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="1164" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">全員予約完了？</text>
<text x="340" y="1180" font-size="10" text-anchor="middle" fill="#993C1D">未予約クライアントあり？</text>

<!-- 矢印: 判断4 Yes → 締め切りロック -->
<line x1="340" y1="1210" x2="340" y2="1230" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1234 336,1226 344,1226" fill="#555555"/>
<text x="350" y="1223" font-size="11" fill="#555555">Yes（全員完了）</text>

<!-- ===== 締め切りロック（管理者操作） ===== -->
<rect x="210" y="1234" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="1254" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑥″ 締め切りロック</text>
<text x="340" y="1272" font-size="11" text-anchor="middle" fill="#534AB7">管理者がエントリー終了 →「予約」→「確定」（緑）に変化・変更不可</text>
<text x="90" y="1254" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="1268" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="118" y1="1261" x2="208" y2="1261" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: 締め切りロック → STEP7 -->
<line x1="340" y1="1286" x2="340" y2="1306" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1310 336,1302 344,1302" fill="#555555"/>

<!-- 矢印: 判断4 No → STEP6（戻り） -->
<text x="204" y="1156" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・再送）</text>
<line x1="258" y1="1170" x2="162" y2="1170" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="162" y1="1170" x2="162" y2="681" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="162" y1="681" x2="208" y2="681" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,681 202,677 202,685" fill="#BBBBBB"/>

<!-- ===== STEP7: 確定表出力 ===== -->
<rect x="210" y="1310" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="1331" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑦ 確定・日程調整表を出力</text>
<text x="340" y="1349" font-size="11" text-anchor="middle" fill="#534AB7">日付・時間・LN・受講生名・コーチ名</text>
<text x="340" y="1365" font-size="11" text-anchor="middle" fill="#534AB7">Zoom情報付き確定表を自動生成</text>
<!-- 役割ラベル -->
<text x="90" y="1334" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="1348" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="118" y1="1341" x2="208" y2="1341" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP7 → STEP8 -->
<line x1="340" y1="1376" x2="340" y2="1392" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1396 336,1388 344,1388" fill="#555555"/>

<!-- ===== STEP8: チーム共有 ===== -->
<rect x="210" y="1396" width="260" height="66" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="1417" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">⑧ 日程表をチーム全員と共有</text>
<text x="340" y="1435" font-size="11" text-anchor="middle" fill="#5F5E5A">コーチ・クライアント全員に送付</text>
<text x="340" y="1451" font-size="11" text-anchor="middle" fill="#5F5E5A">（Zoom情報はこのタイミングで開示）</text>

<!-- 矢印: STEP8 → END -->
<line x1="340" y1="1462" x2="340" y2="1478" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1482 336,1474 344,1474" fill="#555555"/>

<!-- ===== END ===== -->
<rect x="255" y="1482" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="1504" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">完了</text>

<!-- フッター -->
<text x="340" y="1572" font-size="10" text-anchor="middle" fill="#BBBBBB">LV 1on1 日程調整アプリ — 業務フロー v10　© 2026 Toshihisa Nakamura</text>

</svg>
