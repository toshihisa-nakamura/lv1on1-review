<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日程予約</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --a:#D4720A;--a2:#FEF3E6;--a3:#F5C98A;
  --n:#0F1B35;--s:#F2F1EE;--st:#C8C5BC;
  --i:#1C1C1E;--i2:#6B6B70;
  --g:#1A7A5E;--g2:#E6F7F3;--g3:#A0D8CE;
  --p:#3D5A99;--p2:#EEF0F9;--p3:#C5CCEE;
  --r:#D93025;--r2:#FEE8E6;
  --w:#FFFFFF;
  --sb:env(safe-area-inset-bottom,16px);
}
html,body{background:var(--s);color:var(--i);font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:16px;-webkit-tap-highlight-color:transparent}

/* HEADER */
.hdr{background:var(--n);color:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:50}
.hdr-title{font-size:17px;font-weight:700;margin-bottom:3px}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.55)}

/* BODY */
.body{padding:14px 12px 160px}

/* STEP */
.steps{display:flex;gap:0;margin-bottom:16px;background:var(--w);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.step{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;color:var(--st);border-right:1px solid var(--s);position:relative}
.step:last-child{border-right:none}
.step.done{color:var(--g)}
.step.active{color:var(--n)}
.step.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--a)}
.step-n{font-size:10px;opacity:.6;margin-bottom:2px}

/* CARD */
.card{background:var(--w);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-lbl{font-size:11px;font-weight:700;color:var(--i2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}

/* INPUTS */
.field-row{display:grid;grid-template-columns:100px 1fr;gap:10px}
.f-lbl{font-size:11px;font-weight:700;color:var(--i2);letter-spacing:.5px;margin-bottom:5px;display:block}
.f-input{height:50px;width:100%;padding:0 14px;border:1.5px solid #DDD;border-radius:10px;font-size:16px;font-family:inherit;color:var(--n);background:var(--w);transition:border-color .15s}
.f-input:focus{outline:none;border-color:var(--a)}
.f-input.filled{border-color:var(--a3);background:var(--a2)}

/* SLOT */
.slots{display:flex;flex-direction:column;gap:8px}
.slot{display:flex;align-items:center;padding:16px 14px;border-radius:12px;border:1.5px solid #E0DDD8;background:var(--s);cursor:pointer;gap:12px;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.slot:active{transform:scale(.98)}
.slot.sel{border-color:var(--a);background:var(--a2);box-shadow:0 0 0 3px rgba(212,114,10,.1)}
.slot.locked{border-color:var(--p3);background:var(--p2);pointer-events:none;opacity:.6}
.slot.booked{opacity:.3;pointer-events:none;background:#EDEBE8;border-color:#DDD}

.s-radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--st);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.slot.sel .s-radio{border-color:var(--a);background:var(--a)}
.slot.locked .s-radio{border-color:var(--p);background:var(--p)}
.s-dot{width:8px;height:8px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s}
.slot.sel .s-dot,.slot.locked .s-dot{opacity:1}

.s-info{flex:1;min-width:0}
.s-date{font-size:13px;font-weight:700;color:var(--n);margin-bottom:4px}
.s-time{font-size:18px;font-weight:700;color:var(--i);letter-spacing:-.3px}
.s-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.s-badge.open{background:var(--g2);color:var(--g);border:1px solid var(--g3)}
.s-badge.taken{background:#EDEBE8;color:var(--st)}
.s-badge.locking{background:var(--p2);color:var(--p);border:1px solid var(--p3)}

/* CONFIRM */
.confirm{background:var(--a2);border:1.5px solid var(--a3);border-radius:12px;padding:16px;margin-bottom:12px;display:none}
.confirm.show{display:block}
.confirm-lbl{font-size:11px;font-weight:700;color:var(--a);letter-spacing:.8px;margin-bottom:8px}
.confirm-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.confirm-key{font-size:11px;color:var(--i2);white-space:nowrap;min-width:40px}
.confirm-val{font-size:15px;font-weight:700;color:var(--n)}

/* TIMER */
.timer-box{background:var(--p2);border:1.5px solid var(--p3);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:none;align-items:center;gap:12px}
.timer-box.show{display:flex}
.timer-icon{font-size:20px;flex-shrink:0}
.timer-text{flex:1;font-size:13px;color:var(--p);font-weight:600}
.timer-count{font-size:22px;font-weight:700;color:var(--p);min-width:48px;text-align:right}
.timer-count.warn{color:var(--r)}

/* ERR */
.err-box{background:var(--r2);border:1px solid #F7C1C1;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--r);margin-bottom:12px;display:none;line-height:1.5}
.err-box.show{display:block}

/* FOOTER - 3ボタン */
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid #E8E8E8;padding:10px 12px calc(10px + var(--sb));z-index:100}
.btn-row{display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:8px}
.fbtn{height:52px;border-radius:12px;border:none;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.fbtn:active:not(:disabled){transform:scale(.97)}
.fbtn:disabled{opacity:.35;cursor:not-allowed}

/* 確定ボタン */
.btn-kakutei{background:var(--a2);color:var(--a);border:1.5px solid var(--a3)}
.btn-kakutei.active{background:var(--a);color:#fff;border-color:var(--a);box-shadow:0 0 0 3px rgba(212,114,10,.2)}

/* 取消ボタン */
.btn-torikeshi{background:var(--r2);color:var(--r);border:1.5px solid #F7C1C1}
.btn-torikeshi.active{background:var(--r);color:#fff;border-color:var(--r)}

/* 送信ボタン */
.btn-soushin{background:#DDD;color:var(--st);border:none}
.btn-soushin.active{background:var(--g);color:#fff;animation:pulse-g 1.5s infinite}
@keyframes pulse-g{0%,100%{box-shadow:0 0 0 0 rgba(26,122,94,.4)}50%{box-shadow:0 0 0 7px rgba(26,122,94,0)}}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.ov-box{background:var(--w);border-radius:20px;padding:36px 24px;text-align:center;width:100%;max-width:320px}
.ov-icon{font-size:52px}
.ov-title{font-size:22px;font-weight:700;color:var(--n);margin:12px 0 8px}
.ov-detail{font-size:14px;color:var(--i2);line-height:1.8;margin-bottom:12px}
.ov-email{background:var(--g2);border:1px solid var(--g3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--g);font-weight:600;margin-bottom:8px}
.ov-note{font-size:12px;color:var(--st)}
.ov-tag{display:inline-block;margin-top:12px;padding:4px 14px;background:#FEF3E6;border-radius:20px;font-size:11px;font-weight:700;color:#8A4B0A}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">📆 日程予約</div>
  <div class="hdr-sub">LV コーチング 2026春</div>
</div>

<div class="body">

  <div class="steps">
    <div class="step active" id="step1"><div class="step-n">STEP 1</div>情報入力</div>
    <div class="step" id="step2"><div class="step-n">STEP 2</div>日程選択</div>
    <div class="step" id="step3"><div class="step-n">STEP 3</div>確定・送信</div>
  </div>

  <!-- 受講者情報 -->
  <div class="card" id="cardInfo">
    <div class="card-lbl">受講者情報</div>
    <label class="f-lbl">受講番号（LN）</label>
    <input type="text" class="f-input" id="ln" placeholder="例：299" inputmode="numeric" oninput="onInput()" style="margin-bottom:10px">
    <label class="f-lbl">お名前</label>
    <input type="text" class="f-input" id="uname" placeholder="例：山田 太郎" oninput="onInput()" style="margin-bottom:10px">
    <label class="f-lbl">メールアドレス</label>
    <input type="email" class="f-input" id="email" placeholder="例：taro@example.com" inputmode="email" oninput="onInput()">
  </div>

  <div class="err-box" id="errBox"></div>

  <!-- タイマー表示 -->
  <div class="timer-box" id="timerBox">
    <div class="timer-icon">⏱</div>
    <div class="timer-text">仮予約中<br><span style="font-size:11px;font-weight:400">時間内に【送信】してください</span></div>
    <div class="timer-count" id="timerCount">10:00</div>
  </div>

  <!-- 空き枠 -->
  <div class="card">
    <div class="card-lbl">希望日程（1つ選択）</div>
    <div class="slots" id="slotList"></div>
  </div>

  <!-- 確認ボックス -->
  <div class="confirm" id="confirmBox">
    <div class="confirm-lbl">仮予約内容</div>
    <div class="confirm-row"><span class="confirm-key">日時</span><span class="confirm-val" id="cv-date"></span></div>
    <div class="confirm-row"><span class="confirm-key">時間</span><span class="confirm-val" id="cv-time"></span></div>
    <div class="confirm-row"><span class="confirm-key">名前</span><span class="confirm-val" id="cv-name"></span></div>
    <div class="confirm-row"><span class="confirm-key">LN</span><span class="confirm-val" id="cv-ln"></span></div>
    <div class="confirm-row"><span class="confirm-key">メール</span><span class="confirm-val" id="cv-email" style="font-size:13px;word-break:break-all"></span></div>
    <div style="font-size:11px;color:var(--i2);margin-top:8px;padding-top:8px;border-top:1px solid var(--a3)">
      【送信】で予約確定。【取消】でやり直せます。
    </div>
  </div>

</div>

<!-- Footer 3ボタン -->
<div class="footer">
  <div class="btn-row">
    <button class="fbtn btn-kakutei" id="btnKakutei" onclick="doKakutei()" disabled>
      ✓ 確定
    </button>
    <button class="fbtn btn-torikeshi" id="btnTorikeshi" onclick="doTorikeshi()" disabled>
      × 取消
    </button>
    <button class="fbtn btn-soushin" id="btnSoushin" onclick="doSoushin()" disabled>
      📨 送信
    </button>
  </div>
</div>

<!-- 完了オーバーレイ -->
<div class="overlay" id="overlay">
  <div class="ov-box">
    <div class="ov-icon">✅</div>
    <div class="ov-title">予約完了！</div>
    <div class="ov-detail" id="ovDetail"></div>
    <div class="ov-email" id="ovEmail"></div>
    <div class="ov-note">このページを閉じてください。</div>
    <div class="ov-tag">※ これはデモです</div>
  </div>
</div>

<script>
var SLOTS = [
  {id:'S001',date:'2026/04/22',w:'水',st:'09:00',et:'10:15',status:'open'},
  {id:'S002',date:'2026/04/23',w:'木',st:'15:15',et:'16:30',status:'open'},
  {id:'S003',date:'2026/04/23',w:'木',st:'20:30',et:'21:45',status:'booked'}, // 予約済みデモ
  {id:'S004',date:'2026/04/24',w:'金',st:'11:00',et:'12:15',status:'open'},
  {id:'S005',date:'2026/04/25',w:'土',st:'10:00',et:'11:15',status:'open'},
  {id:'S006',date:'2026/04/26',w:'日',st:'19:30',et:'20:45',status:'open'},
  {id:'S007',date:'2026/05/01',w:'金',st:'10:00',et:'11:15',status:'open'},
  {id:'S008',date:'2026/05/03',w:'日',st:'14:00',et:'15:15',status:'open'},
  {id:'S009',date:'2026/05/06',w:'水',st:'16:45',et:'18:00',status:'open'},
  {id:'S010',date:'2026/05/07',w:'木',st:'09:00',et:'10:15',status:'open'},
];

var selected  = null;  // 選択中の枠
var isLocked  = false; // 仮予約ロック中か
var timerInt  = null;  // タイマーinterval
var timerSec  = 600;   // 10分

// ===== 枠描画 =====
function renderSlots() {
  var wrap = document.getElementById('slotList');
  wrap.innerHTML = '';
  SLOTS.forEach(function(s) {
    var p = s.date.split('/');
    var dateStr = p[1]+'/'+p[2]+'（'+s.w+'）';
    var isBooked = s.status === 'booked';
    var isLocking = s.status === 'locking';
    var cls = 'slot' + (isBooked ? ' booked' : '') + (isLocking ? ' locked' : '');
    if (selected && selected.id === s.id && isLocked) cls = 'slot sel';

    var badgeClass = isBooked ? 'taken' : (isLocking ? 'locking' : 'open');
    var badgeText  = isBooked ? '予約済' : (isLocking ? '仮予約中' : '空き');

    var div = document.createElement('div');
    div.className = cls;
    div.dataset.id = s.id;
    div.innerHTML =
      '<div class="s-radio"><div class="s-dot"></div></div>'+
      '<div class="s-info">'+
        '<div class="s-date">'+dateStr+'</div>'+
        '<div class="s-time">'+s.st+' 〜 '+s.et+'</div>'+
      '</div>'+
      '<div class="s-badge '+badgeClass+'">'+badgeText+'</div>';

    if (!isBooked && !isLocking) {
      div.addEventListener('click', function() { selectSlot(s); });
    }
    wrap.appendChild(div);
  });
}
renderSlots();

// ===== 枠選択 =====
function selectSlot(s) {
  if (isLocked) return; // ロック中は選択不可
  if (!validateInfo()) return;
  selected = s;
  setStep(2);

  // 確認ボックス更新
  var p = s.date.split('/');
  document.getElementById('cv-date').textContent = p[1]+'月'+p[2]+'日（'+s.w+'）';
  document.getElementById('cv-time').textContent = s.st+' 〜 '+s.et;
  document.getElementById('cv-name').textContent = document.getElementById('uname').value.trim();
  document.getElementById('cv-ln').textContent   = document.getElementById('ln').value.trim();
  document.getElementById('cv-email').textContent = document.getElementById('email').value.trim();

  // 確定ボタンを活性化
  document.getElementById('btnKakutei').disabled = false;
  document.getElementById('btnKakutei').classList.add('active');

  // 枠を選択状態に再描画
  document.querySelectorAll('.slot').forEach(function(el) {
    el.classList.remove('sel');
    if (el.dataset.id === s.id) el.classList.add('sel');
  });

  hideErr();
}

// ===== 確定ボタン =====
function doKakutei() {
  if (!selected || !validateInfo()) return;
  isLocked = true;

  // 枠をlocking状態に
  SLOTS.forEach(function(sl) {
    if (sl.id === selected.id) sl.status = 'locking';
  });
  renderSlots();

  // ボタン状態
  document.getElementById('btnKakutei').disabled = true;
  document.getElementById('btnKakutei').classList.remove('active');
  document.getElementById('btnTorikeshi').disabled = false;
  document.getElementById('btnTorikeshi').classList.add('active');
  document.getElementById('btnSoushin').disabled = false;
  document.getElementById('btnSoushin').classList.add('active');

  // 確認ボックス表示
  document.getElementById('confirmBox').classList.add('show');
  document.getElementById('confirmBox').scrollIntoView({behavior:'smooth',block:'nearest'});

  // タイマー開始
  timerSec = 600;
  document.getElementById('timerBox').classList.add('show');
  updateTimer();
  timerInt = setInterval(function() {
    timerSec--;
    updateTimer();
    if (timerSec <= 0) {
      clearInterval(timerInt);
      doTimeout();
    }
  }, 1000);

  setStep(3);
}

// ===== 取消ボタン =====
function doTorikeshi() {
  clearInterval(timerInt);
  isLocked = false;

  // 枠をopenに戻す
  SLOTS.forEach(function(sl) {
    if (sl.id === selected.id) sl.status = 'open';
  });
  selected = null;

  renderSlots();
  document.getElementById('confirmBox').classList.remove('show');
  document.getElementById('timerBox').classList.remove('show');

  document.getElementById('btnKakutei').disabled = true;
  document.getElementById('btnKakutei').classList.remove('active');
  document.getElementById('btnTorikeshi').disabled = true;
  document.getElementById('btnTorikeshi').classList.remove('active');
  document.getElementById('btnSoushin').disabled = true;
  document.getElementById('btnSoushin').classList.remove('active');

  setStep(2);
  showErr('取消しました。別の日程を選んでください。');
  setTimeout(hideErr, 2500);
}

// ===== タイムアウト =====
function doTimeout() {
  isLocked = false;
  SLOTS.forEach(function(sl) {
    if (selected && sl.id === selected.id) sl.status = 'open';
  });
  selected = null;
  renderSlots();

  document.getElementById('confirmBox').classList.remove('show');
  document.getElementById('timerBox').classList.remove('show');
  document.getElementById('btnKakutei').disabled = true;
  document.getElementById('btnKakutei').classList.remove('active');
  document.getElementById('btnTorikeshi').disabled = true;
  document.getElementById('btnTorikeshi').classList.remove('active');
  document.getElementById('btnSoushin').disabled = true;
  document.getElementById('btnSoushin').classList.remove('active');

  setStep(2);
  showErr('⏱ 仮予約がタイムアウトしました（10分経過）。\nもう一度日程を選んでください。');
}

// ===== タイマー表示 =====
function updateTimer() {
  var m = Math.floor(timerSec / 60);
  var s = timerSec % 60;
  var txt = ('0'+m).slice(-2)+':'+('0'+s).slice(-2);
  var el = document.getElementById('timerCount');
  el.textContent = txt;
  el.className = 'timer-count' + (timerSec <= 60 ? ' warn' : '');
}

// ===== 送信ボタン =====
function doSoushin() {
  if (!isLocked || !selected) return;
  clearInterval(timerInt);

  var p = selected.date.split('/');
  var detail = p[1]+'月'+p[2]+'日（'+selected.w+'）\n'+selected.st+' 〜 '+selected.et;
  var email  = document.getElementById('email').value.trim();

  document.getElementById('ovDetail').textContent = detail;
  document.getElementById('ovEmail').textContent  = '✉ 確認メールを送信しました\n'+email;
  document.getElementById('overlay').classList.add('show');

  // デモ: 実際は google.script.run.submitClientBooking(...)
}

// ===== 入力チェック =====
function validateInfo() {
  var ln  = document.getElementById('ln').value.trim();
  var nm  = document.getElementById('uname').value.trim();
  var em  = document.getElementById('email').value.trim();
  if (!ln)  { showErr('受講番号を入力してください'); document.getElementById('ln').focus(); return false; }
  if (!nm)  { showErr('お名前を入力してください'); document.getElementById('uname').focus(); return false; }
  if (!em || !em.includes('@')) { showErr('正しいメールアドレスを入力してください'); document.getElementById('email').focus(); return false; }
  hideErr(); return true;
}

function onInput() {
  var ln = document.getElementById('ln').value.trim();
  var nm = document.getElementById('uname').value.trim();
  var em = document.getElementById('email').value.trim();
  document.getElementById('ln').classList.toggle('filled', !!ln);
  document.getElementById('uname').classList.toggle('filled', !!nm);
  document.getElementById('email').classList.toggle('filled', !!(em && em.includes('@')));
  if (ln && nm && em.includes('@')) setStep(2);
  else setStep(1);
}

function setStep(n) {
  [1,2,3].forEach(function(i) {
    var el = document.getElementById('step'+i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  });
}
function showErr(m) {
  var el = document.getElementById('errBox');
  el.textContent = m; el.classList.add('show');
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function hideErr() { document.getElementById('errBox').classList.remove('show'); }
</script>
</body>
</html>
