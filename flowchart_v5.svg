<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="1420" viewBox="0 0 680 1420" xmlns="http://www.w3.org/2000/svg"
  style="background:#ffffff; font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;">

<!-- ===== 矢印を描くマクロ的な定義なし版 =====
     全ての矢印を line + polygon で直接描く -->

<!-- 凡例 -->
<rect x="30" y="10" width="620" height="28" rx="4" fill="none" stroke="#CCCCCC" stroke-width="0.5"/>
<rect x="38" y="17" width="11" height="11" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="55" y="27" font-size="11" fill="#534AB7">センタースタッフ</text>
<rect x="160" y="17" width="11" height="11" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="177" y="27" font-size="11" fill="#0F6E56">Bコーチ</text>
<rect x="242" y="17" width="11" height="11" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="259" y="27" font-size="11" fill="#854F0B">クライアント</text>
<rect x="360" y="17" width="11" height="11" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="377" y="27" font-size="11" fill="#993C1D">判断</text>
<rect x="420" y="17" width="11" height="11" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="437" y="27" font-size="11" fill="#5F5E5A">開始/終了</text>

<!-- ===== START ===== -->
<rect x="255" y="50" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">スタート</text>

<!-- 矢印: START → STEP1 -->
<line x1="340" y1="84" x2="340" y2="100" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,104 336,96 344,96" fill="#555555"/>

<!-- ===== STEP1: JOB作成 ===== -->
<rect x="210" y="104" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="125" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">① JOB作成</text>
<text x="340" y="143" font-size="11" text-anchor="middle" fill="#534AB7">イベント名・期間・クライアント人数を設定</text>
<!-- 役割ラベル -->
<text x="90" y="124" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="138" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="118" y1="130" x2="208" y2="130" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP1 → STEP2 -->
<line x1="340" y1="156" x2="340" y2="172" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,176 336,168 344,168" fill="#555555"/>

<!-- ===== STEP2: コーチ入力リンク発行 ===== -->
<rect x="210" y="176" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="197" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">② コーチ入力リンクを発行・送付</text>
<text x="340" y="215" font-size="11" text-anchor="middle" fill="#534AB7">GAS WebアプリURLをBコーチチームに送付</text>

<!-- 矢印: STEP2 → STEP3 -->
<line x1="340" y1="228" x2="340" y2="244" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,248 336,240 344,240" fill="#555555"/>

<!-- ===== STEP3: コーチ日程入力 ===== -->
<rect x="210" y="248" width="260" height="66" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="340" y="269" font-size="13" font-weight="bold" text-anchor="middle" fill="#085041">③ コーチが対応日程を入力</text>
<text x="340" y="287" font-size="11" text-anchor="middle" fill="#0F6E56">名前選択・日付・開始時間を入力</text>
<text x="340" y="303" font-size="11" text-anchor="middle" fill="#0F6E56">終了時間は自動計算（+75分）</text>
<!-- 役割ラベル -->
<text x="592" y="272" font-size="11" text-anchor="middle" fill="#AAAAAA">Bコーチ</text>
<text x="592" y="286" font-size="11" text-anchor="middle" fill="#AAAAAA">チーム全員</text>
<line x1="472" y1="278" x2="562" y2="278" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP3 → 判断1 -->
<line x1="340" y1="314" x2="340" y2="332" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,336 336,328 344,328" fill="#555555"/>

<!-- ===== 判断1: 入力期間内? ===== -->
<polygon points="340,336 422,376 340,416 258,376" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="370" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">入力期間内？</text>
<text x="340" y="386" font-size="10" text-anchor="middle" fill="#993C1D">（タイマー）</text>

<!-- 矢印: 判断1 Yes → STEP4 -->
<line x1="340" y1="416" x2="340" y2="444" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,448 336,440 344,440" fill="#555555"/>
<text x="350" y="435" font-size="11" fill="#555555">Yes</text>

<!-- 矢印: 判断1 No → STEP3（戻り） -->
<text x="204" y="362" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・延長）</text>
<line x1="258" y1="376" x2="178" y2="376" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="376" x2="178" y2="281" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="281" x2="208" y2="281" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,281 202,277 202,285" fill="#BBBBBB"/>

<!-- ===== STEP4: 日程確定 ===== -->
<rect x="210" y="448" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="469" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">④ コーチング日程を確定</text>
<text x="340" y="487" font-size="11" text-anchor="middle" fill="#534AB7">必要枠数に絞り込み・手動調整</text>
<text x="340" y="503" font-size="11" text-anchor="middle" fill="#534AB7">コーチ数 × ceil（人数 ÷ コーチ数）</text>
<!-- 役割ラベル -->
<text x="90" y="472" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="486" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="118" y1="479" x2="208" y2="479" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP4 → STEP5 -->
<line x1="340" y1="514" x2="340" y2="530" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,534 336,526 344,526" fill="#555555"/>

<!-- ===== STEP5: 予約リンク発行 ===== -->
<rect x="210" y="534" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="555" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑤ クライアントに予約リンク送付</text>
<text x="340" y="573" font-size="11" text-anchor="middle" fill="#534AB7">空き枠のみ表示（日時のみ・コーチ名なし）</text>
<text x="340" y="589" font-size="11" text-anchor="middle" fill="#534AB7">LN・氏名・メールアドレスを入力</text>

<!-- 矢印: STEP5 → STEP6 -->
<line x1="340" y1="600" x2="340" y2="616" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,620 336,612 344,612" fill="#555555"/>

<!-- ===== STEP6: クライアント予約 ===== -->
<rect x="210" y="620" width="260" height="66" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="641" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">⑥ クライアントが日程を予約</text>
<text x="340" y="659" font-size="11" text-anchor="middle" fill="#854F0B">希望日程を1つ選択して送信</text>
<text x="340" y="675" font-size="11" text-anchor="middle" fill="#854F0B">→ 予約即ロック（LockService）</text>
<!-- 役割ラベル -->
<text x="592" y="646" font-size="11" text-anchor="middle" fill="#AAAAAA">LV受講生</text>
<text x="592" y="660" font-size="11" text-anchor="middle" fill="#AAAAAA">（クライアント）</text>
<line x1="472" y1="653" x2="562" y2="653" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP6 → 判断2 -->
<line x1="340" y1="686" x2="340" y2="704" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,708 336,700 344,700" fill="#555555"/>

<!-- ===== 判断2: 枠は空き? ===== -->
<polygon points="340,708 422,748 340,788 258,748" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="742" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">枠は空き？</text>
<text x="340" y="758" font-size="10" text-anchor="middle" fill="#993C1D">（排他制御・同時アクセス対策）</text>

<!-- 矢印: 判断2 Yes → STEP6b -->
<line x1="340" y1="788" x2="340" y2="816" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,820 336,812 344,812" fill="#555555"/>
<text x="350" y="807" font-size="11" fill="#555555">Yes（確定）</text>

<!-- 矢印: 判断2 No → STEP6（戻り） -->
<text x="466" y="735" font-size="10" fill="#BBBBBB">No（衝突）</text>
<text x="466" y="749" font-size="10" fill="#BBBBBB">→ 画面に通知</text>
<line x1="422" y1="748" x2="502" y2="748" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="502" y1="748" x2="502" y2="653" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="502" y1="653" x2="472" y2="653" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="470,653 478,649 478,657" fill="#BBBBBB"/>

<!-- ===== STEP6b: 完了メール ===== -->
<rect x="210" y="820" width="260" height="52" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="841" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">⑥′ 予約完了メールを自動送信</text>
<text x="340" y="859" font-size="11" text-anchor="middle" fill="#854F0B">入力メールアドレス宛に自動送信（GAS）</text>

<!-- 矢印: STEP6b → 判断3 -->
<line x1="340" y1="872" x2="340" y2="888" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,892 336,884 344,884" fill="#555555"/>

<!-- ===== 判断3: 予約期間内? ===== -->
<polygon points="340,892 422,932 340,972 258,932" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="926" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">予約期間内？</text>
<text x="340" y="942" font-size="10" text-anchor="middle" fill="#993C1D">（タイマー）</text>

<!-- 矢印: 判断3 Yes → 判断4 -->
<line x1="340" y1="972" x2="340" y2="1000" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1004 336,996 344,996" fill="#555555"/>
<text x="350" y="991" font-size="11" fill="#555555">Yes</text>

<!-- 矢印: 判断3 No → STEP6（戻り） -->
<text x="204" y="918" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・延長）</text>
<line x1="258" y1="932" x2="170" y2="932" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="170" y1="932" x2="170" y2="653" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="170" y1="653" x2="208" y2="653" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,653 202,649 202,657" fill="#BBBBBB"/>

<!-- ===== 判断4: 全員完了? ===== -->
<polygon points="340,1004 422,1044 340,1084 258,1044" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="1038" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">全員予約完了？</text>
<text x="340" y="1054" font-size="10" text-anchor="middle" fill="#993C1D">未予約クライアントあり？</text>

<!-- 矢印: 判断4 Yes → STEP7 -->
<line x1="340" y1="1084" x2="340" y2="1112" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1116 336,1108 344,1108" fill="#555555"/>
<text x="350" y="1102" font-size="11" fill="#555555">Yes（全員完了）</text>

<!-- 矢印: 判断4 No → STEP6（戻り） -->
<text x="204" y="1030" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・再送）</text>
<line x1="258" y1="1044" x2="162" y2="1044" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="162" y1="1044" x2="162" y2="653" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="162" y1="653" x2="208" y2="653" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,653 202,649 202,657" fill="#BBBBBB"/>

<!-- ===== STEP7: 確定表出力 ===== -->
<rect x="210" y="1116" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="1137" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑦ 確定・日程調整表を出力</text>
<text x="340" y="1155" font-size="11" text-anchor="middle" fill="#534AB7">日付・時間・LN・受講生名・コーチ名</text>
<text x="340" y="1171" font-size="11" text-anchor="middle" fill="#534AB7">Zoom情報付き確定表を自動生成</text>
<!-- 役割ラベル -->
<text x="90" y="1140" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="1154" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="118" y1="1147" x2="208" y2="1147" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- 矢印: STEP7 → STEP8 -->
<line x1="340" y1="1182" x2="340" y2="1198" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1202 336,1194 344,1194" fill="#555555"/>

<!-- ===== STEP8: チーム共有 ===== -->
<rect x="210" y="1202" width="260" height="66" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="1223" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">⑧ 日程表をチーム全員と共有</text>
<text x="340" y="1241" font-size="11" text-anchor="middle" fill="#5F5E5A">コーチ・クライアント全員に送付</text>
<text x="340" y="1257" font-size="11" text-anchor="middle" fill="#5F5E5A">（Zoom情報はこのタイミングで開示）</text>

<!-- 矢印: STEP8 → END -->
<line x1="340" y1="1268" x2="340" y2="1284" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1288 336,1280 344,1280" fill="#555555"/>

<!-- ===== END ===== -->
<rect x="255" y="1288" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="1310" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">完了</text>

<!-- フッター -->
<text x="340" y="1378" font-size="10" text-anchor="middle" fill="#BBBBBB">LV 1on1 日程調整アプリ — 業務フロー v4　© アクトリーダーシップセンター</text>

</svg>
