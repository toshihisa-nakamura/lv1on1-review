<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="1320" viewBox="0 0 680 1320" xmlns="http://www.w3.org/2000/svg"
  style="background:#ffffff; font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;">

<!-- 凡例 -->
<rect x="30" y="10" width="620" height="28" rx="4" fill="none" stroke="#CCCCCC" stroke-width="0.5"/>
<rect x="38" y="17" width="11" height="11" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="55" y="27" font-size="11" fill="#534AB7">センタースタッフ</text>
<rect x="160" y="17" width="11" height="11" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="177" y="27" font-size="11" fill="#0F6E56">Bコーチ</text>
<rect x="242" y="17" width="11" height="11" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="259" y="27" font-size="11" fill="#854F0B">クライアント</text>
<rect x="360" y="17" width="11" height="11" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="377" y="27" font-size="11" fill="#993C1D">判断</text>
<rect x="438" y="17" width="11" height="11" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<rect x="440" y="19" width="7" height="7" rx="1" fill="none" stroke="#0F6E56" stroke-width="0.5"/>
<text x="455" y="27" font-size="11" fill="#555555">サブフロー参照</text>

<!-- START -->
<rect x="255" y="50" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">スタート</text>
<line x1="340" y1="84" x2="340" y2="102" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,106 336,98 344,98" fill="#555555"/>

<!-- STEP1: JOB作成 -->
<rect x="210" y="106" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="127" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">① JOB作成</text>
<text x="340" y="145" font-size="11" text-anchor="middle" fill="#534AB7">イベント名・期間・クライアント人数を設定</text>
<text x="90" y="126" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="140" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="120" y1="133" x2="208" y2="133" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="340" y1="158" x2="340" y2="176" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,180 336,172 344,172" fill="#555555"/>

<!-- STEP2: コーチリンク発行 -->
<rect x="210" y="180" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="201" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">② コーチ入力リンクを発行・送付</text>
<text x="340" y="219" font-size="11" text-anchor="middle" fill="#534AB7">GAS WebアプリURLをBコーチチームに送付</text>
<line x1="340" y1="232" x2="340" y2="250" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,254 336,246 344,246" fill="#555555"/>

<!-- STEP3: サブフロー（コーチUI） -->
<rect x="210" y="254" width="260" height="52" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<rect x="214" y="258" width="252" height="44" rx="2" fill="none" stroke="#0F6E56" stroke-width="0.6"/>
<text x="340" y="275" font-size="13" font-weight="bold" text-anchor="middle" fill="#085041">③ コーチが対応日程を入力</text>
<text x="340" y="293" font-size="11" text-anchor="middle" fill="#0F6E56">詳細 → コーチUIフロー参照</text>
<text x="592" y="272" font-size="11" text-anchor="middle" fill="#AAAAAA">Bコーチ</text>
<text x="592" y="286" font-size="11" text-anchor="middle" fill="#AAAAAA">チーム全員</text>
<line x1="472" y1="279" x2="562" y2="279" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="340" y1="306" x2="340" y2="324" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,328 336,320 344,320" fill="#555555"/>

<!-- 判断1: 入力期間内? -->
<polygon points="340,328 422,368 340,408 258,368" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="362" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">入力期間内？</text>
<text x="340" y="378" font-size="10" text-anchor="middle" fill="#993C1D">（タイマー）</text>
<line x1="340" y1="408" x2="340" y2="432" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,436 336,428 344,428" fill="#555555"/>
<text x="350" y="424" font-size="11" fill="#555555">Yes</text>
<text x="204" y="354" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・延長）</text>
<line x1="258" y1="368" x2="178" y2="368" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="368" x2="178" y2="279" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="279" x2="208" y2="279" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,279 202,275 202,283" fill="#BBBBBB"/>

<!-- STEP4: 日程確定 -->
<rect x="210" y="436" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="457" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">④ コーチング日程を確定</text>
<text x="340" y="475" font-size="11" text-anchor="middle" fill="#534AB7">必要枠数に絞り込み・手動調整</text>
<text x="340" y="491" font-size="11" text-anchor="middle" fill="#534AB7">コーチ数 × ceil（人数 ÷ コーチ数）</text>
<text x="90" y="460" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="474" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="120" y1="467" x2="208" y2="467" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="340" y1="502" x2="340" y2="520" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,524 336,516 344,516" fill="#555555"/>

<!-- STEP5: 予約リンク発行 -->
<rect x="210" y="524" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="545" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑤ クライアントに予約リンク送付</text>
<text x="340" y="563" font-size="11" text-anchor="middle" fill="#534AB7">空き枠のみ表示（日時・コーチ名なし）</text>
<line x1="340" y1="576" x2="340" y2="594" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,598 336,590 344,590" fill="#555555"/>

<!-- STEP6: サブフロー（クライアントUI） -->
<rect x="210" y="598" width="260" height="52" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<rect x="214" y="602" width="252" height="44" rx="2" fill="none" stroke="#854F0B" stroke-width="0.6"/>
<text x="340" y="619" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">⑥ クライアントが日程を予約</text>
<text x="340" y="637" font-size="11" text-anchor="middle" fill="#854F0B">詳細 → クライアントUIフロー参照</text>
<text x="592" y="616" font-size="11" text-anchor="middle" fill="#AAAAAA">LV受講生</text>
<text x="592" y="630" font-size="11" text-anchor="middle" fill="#AAAAAA">（クライアント）</text>
<line x1="472" y1="623" x2="562" y2="623" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="340" y1="650" x2="340" y2="668" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,672 336,664 344,664" fill="#555555"/>

<!-- 判断2: 予約期間内? -->
<polygon points="340,672 422,712 340,752 258,712" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="706" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">予約期間内？</text>
<text x="340" y="722" font-size="10" text-anchor="middle" fill="#993C1D">（タイマー）</text>
<line x1="340" y1="752" x2="340" y2="776" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,780 336,772 344,772" fill="#555555"/>
<text x="350" y="768" font-size="11" fill="#555555">Yes</text>
<text x="204" y="698" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・延長）</text>
<line x1="258" y1="712" x2="170" y2="712" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="170" y1="712" x2="170" y2="623" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="170" y1="623" x2="208" y2="623" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,623 202,619 202,627" fill="#BBBBBB"/>

<!-- 判断3: 全員完了? -->
<polygon points="340,780 422,820 340,860 258,820" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="814" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">全員予約完了？</text>
<text x="340" y="830" font-size="10" text-anchor="middle" fill="#993C1D">未予約クライアントあり？</text>
<line x1="340" y1="860" x2="340" y2="884" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,888 336,880 344,880" fill="#555555"/>
<text x="350" y="876" font-size="11" fill="#555555">Yes（全員完了）</text>
<text x="204" y="806" font-size="10" text-anchor="end" fill="#BBBBBB">No（督促・再送）</text>
<line x1="258" y1="820" x2="162" y2="820" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="162" y1="820" x2="162" y2="623" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="162" y1="623" x2="208" y2="623" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,623 202,619 202,627" fill="#BBBBBB"/>

<!-- 締め切りロック -->
<rect x="210" y="888" width="260" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="909" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑥″ 締め切りロック</text>
<text x="340" y="927" font-size="11" text-anchor="middle" fill="#534AB7">管理者がエントリー終了 →「予約」→「確定」</text>
<text x="90" y="909" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="923" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="120" y1="916" x2="208" y2="916" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="340" y1="940" x2="340" y2="958" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,962 336,954 344,954" fill="#555555"/>

<!-- STEP7: 確定表出力 -->
<rect x="210" y="962" width="260" height="66" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text x="340" y="983" font-size="13" font-weight="bold" text-anchor="middle" fill="#3C3489">⑦ 確定・日程調整表を出力</text>
<text x="340" y="1001" font-size="11" text-anchor="middle" fill="#534AB7">日付・時間・LN・受講生名・コーチ名</text>
<text x="340" y="1017" font-size="11" text-anchor="middle" fill="#534AB7">Zoom情報付き確定表を自動生成</text>
<text x="90" y="986" font-size="11" text-anchor="middle" fill="#AAAAAA">センター</text>
<text x="90" y="1000" font-size="11" text-anchor="middle" fill="#AAAAAA">スタッフ</text>
<line x1="120" y1="993" x2="208" y2="993" stroke="#CCCCCC" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="340" y1="1028" x2="340" y2="1046" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1050 336,1042 344,1042" fill="#555555"/>

<!-- STEP8: 共有 -->
<rect x="210" y="1050" width="260" height="66" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="1071" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">⑧ 日程表をチーム全員と共有</text>
<text x="340" y="1089" font-size="11" text-anchor="middle" fill="#5F5E5A">コーチ・クライアント全員に送付</text>
<text x="340" y="1105" font-size="11" text-anchor="middle" fill="#5F5E5A">（Zoom情報はこのタイミングで開示）</text>
<line x1="340" y1="1116" x2="340" y2="1134" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,1138 336,1130 344,1130" fill="#555555"/>

<!-- END -->
<rect x="255" y="1138" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="1160" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">完了</text>

<text x="340" y="1218" font-size="10" text-anchor="middle" fill="#BBBBBB">LV 1on1 — ゼネラルフロー v1　© 2026 Toshihisa Nakamura</text>
<text x="340" y="1233" font-size="10" text-anchor="middle" fill="#AAAAAA">③ 詳細 → flowchart_coach.svg　　⑥ 詳細 → flowchart_client.svg</text>
</svg>