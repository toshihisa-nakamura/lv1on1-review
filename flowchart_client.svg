<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="1060" viewBox="0 0 680 1060" xmlns="http://www.w3.org/2000/svg"
  style="background:#ffffff; font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;">

<!-- タイトル -->
<rect x="185" y="16" width="310" height="34" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="340" y="38" font-size="14" font-weight="bold" text-anchor="middle" fill="#633806">クライアントUIフロー（⑥の詳細）</text>

<!-- ステータス凡例 -->
<rect x="30" y="60" width="620" height="28" rx="4" fill="none" stroke="#CCCCCC" stroke-width="0.5"/>
<rect x="38" y="67" width="30" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="73" y="77" font-size="10" fill="#0F6E56">空き</text>
<rect x="110" y="67" width="30" height="12" rx="2" fill="#EEF0F9" stroke="#534AB7" stroke-width="0.8"/>
<text x="145" y="77" font-size="10" fill="#534AB7">仮ロック中</text>
<rect x="220" y="67" width="30" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="255" y="77" font-size="10" fill="#854F0B">予約（エントリー期間中）</text>
<rect x="420" y="67" width="30" height="12" rx="2" fill="#E6F5EE" stroke="#0A5C3A" stroke-width="0.8"/>
<text x="455" y="77" font-size="10" fill="#0A5C3A">確定（締め切り後）</text>

<!-- START -->
<rect x="255" y="102" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="124" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">クライアントがURLを開く</text>
<line x1="340" y1="136" x2="340" y2="154" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,158 336,150 344,150" fill="#555555"/>

<!-- STEP1: 情報入力 -->
<rect x="210" y="158" width="260" height="66" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="179" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">STEP1 受講者情報を入力</text>
<text x="340" y="197" font-size="11" text-anchor="middle" fill="#854F0B">LNナンバー / お名前 / メールアドレス</text>
<text x="340" y="213" font-size="10" text-anchor="middle" fill="#854F0B">全項目入力完了でSTEP2が開放</text>
<line x1="340" y1="224" x2="340" y2="242" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,246 336,238 344,238" fill="#555555"/>

<!-- STEP2: 枠選択 -->
<rect x="210" y="246" width="260" height="80" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="267" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">STEP2 日程一覧から枠を選択</text>
<text x="340" y="285" font-size="11" text-anchor="middle" fill="#854F0B">空き枠（緑）のみ選択可</text>
<text x="340" y="301" font-size="11" text-anchor="middle" fill="#854F0B">予約済み枠（オレンジ）に受講者名を表示</text>
<text x="340" y="316" font-size="10" text-anchor="middle" fill="#854F0B">本人確認：氏名＋メールアドレスで照合</text>
<line x1="340" y1="326" x2="340" y2="344" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,348 336,340 344,340" fill="#555555"/>

<!-- 確定ボタン -->
<rect x="210" y="348" width="260" height="66" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="369" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">STEP3 【確定】ボタンを押す</text>
<text x="340" y="387" font-size="11" font-weight="bold" text-anchor="middle" fill="#534AB7">→ 枠：仮ロック中（青紫）</text>
<text x="340" y="403" font-size="10" text-anchor="middle" fill="#854F0B">10分タイムアウトで自動解除</text>
<line x1="340" y1="414" x2="340" y2="432" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,436 336,428 344,428" fill="#555555"/>

<!-- 判断: 送信する? -->
<polygon points="340,436 422,476 340,516 258,476" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="470" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">送信する？</text>
<!-- 取消 -->
<text x="204" y="462" font-size="10" text-anchor="end" fill="#BBBBBB">取消ボタン</text>
<line x1="258" y1="476" x2="178" y2="476" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="476" x2="178" y2="300" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="178" y1="300" x2="208" y2="300" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="210,300 202,296 202,304" fill="#BBBBBB"/>
<text x="158" y="392" font-size="9" text-anchor="middle" fill="#BBBBBB">枠を空きに戻す</text>
<!-- タイムアウト -->
<text x="466" y="462" font-size="10" fill="#993C1D">10分経過</text>
<line x1="422" y1="476" x2="502" y2="476" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="502" y1="476" x2="502" y2="300" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="502" y1="300" x2="472" y2="300" stroke="#993C1D" stroke-width="1" stroke-dasharray="3 2"/>
<polygon points="470,300 478,296 478,304" fill="#993C1D"/>
<text x="530" y="392" font-size="9" text-anchor="middle" fill="#993C1D">自動解除</text>
<!-- Yes → 送信 -->
<text x="350" y="534" font-size="11" fill="#555555">Yes</text>
<line x1="340" y1="516" x2="340" y2="548" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,552 336,544 344,544" fill="#555555"/>

<!-- 送信 → 予約 -->
<rect x="210" y="552" width="260" height="66" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="573" font-size="13" font-weight="bold" text-anchor="middle" fill="#633806">【送信】→ 枠：予約（オレンジ）</text>
<text x="340" y="591" font-size="11" text-anchor="middle" fill="#854F0B">枠に受講者名が表示される</text>
<text x="340" y="607" font-size="10" text-anchor="middle" fill="#854F0B">予約完了メールを自動送信</text>
<line x1="340" y1="618" x2="340" y2="636" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,640 336,632 344,632" fill="#555555"/>

<!-- 判断: 変更する? -->
<polygon points="340,640 422,680 340,720 258,680" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="668" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">変更・取消する？</text>
<text x="340" y="684" font-size="10" text-anchor="middle" fill="#993C1D">（エントリー期間中のみ）</text>
<!-- Yes → 取消して選び直し -->
<text x="466" y="666" font-size="10" fill="#1A7A5E">Yes（取消ボタン）</text>
<line x1="422" y1="680" x2="502" y2="680" stroke="#1A7A5E" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="502" y1="680" x2="502" y2="290" stroke="#1A7A5E" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="502" y1="290" x2="472" y2="290" stroke="#1A7A5E" stroke-width="1" stroke-dasharray="3 2"/>
<polygon points="470,290 478,286 478,294" fill="#1A7A5E"/>
<text x="548" y="490" font-size="9" text-anchor="middle" fill="#1A7A5E">枠を空きに戻す</text>
<text x="548" y="501" font-size="9" text-anchor="middle" fill="#1A7A5E">→ 選び直し可</text>
<!-- No → END -->
<text x="350" y="738" font-size="11" fill="#555555">No</text>
<line x1="340" y1="720" x2="340" y2="752" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,756 336,748 344,748" fill="#555555"/>

<!-- 締め切りロック後 -->
<rect x="210" y="756" width="260" height="52" rx="4" fill="#E6F5EE" stroke="#0A5C3A" stroke-width="1.2"/>
<text x="340" y="777" font-size="13" font-weight="bold" text-anchor="middle" fill="#0A5C3A">締め切りロック後</text>
<text x="340" y="795" font-size="11" text-anchor="middle" fill="#0A5C3A">枠：確定（濃いグリーン）変更不可</text>
<line x1="340" y1="808" x2="340" y2="826" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,830 336,822 344,822" fill="#555555"/>

<!-- END -->
<rect x="255" y="830" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="852" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">ゼネラルフローへ戻る</text>

<text x="340" y="910" font-size="10" text-anchor="middle" fill="#BBBBBB">LV 1on1 — クライアントUIフロー v1　© 2026 Toshihisa Nakamura</text>
</svg>