<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="900" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg"
  style="background:#ffffff; font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;">

<!-- タイトル -->
<rect x="210" y="16" width="260" height="34" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="340" y="38" font-size="14" font-weight="bold" text-anchor="middle" fill="#085041">コーチUIフロー（③の詳細）</text>

<!-- START -->
<rect x="255" y="68" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="90" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">コーチがURLを開く</text>
<line x1="340" y1="102" x2="340" y2="120" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,124 336,116 344,116" fill="#555555"/>

<!-- 判断: 送信済みデータあり? -->
<polygon points="340,124 422,164 340,204 258,164" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="158" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">送信済みデータあり？</text>
<text x="340" y="174" font-size="10" text-anchor="middle" fill="#993C1D">（前回の入力が存在するか）</text>
<!-- Yes → 復元 -->
<text x="350" y="222" font-size="11" fill="#555555">Yes</text>
<line x1="340" y1="204" x2="340" y2="226" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,230 336,222 344,222" fill="#555555"/>
<!-- No → 空白フォームへ -->
<text x="466" y="150" font-size="10" fill="#BBBBBB">No（初回）</text>
<line x1="422" y1="164" x2="502" y2="164" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="502" y1="164" x2="502" y2="310" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="502" y1="310" x2="472" y2="310" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="4 3"/>
<polygon points="470,310 478,306 478,314" fill="#BBBBBB"/>

<!-- 送信済み内容を画面に復元 -->
<rect x="210" y="230" width="260" height="52" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="340" y="251" font-size="13" font-weight="bold" text-anchor="middle" fill="#085041">前回の入力内容を画面に復元</text>
<text x="340" y="269" font-size="11" text-anchor="middle" fill="#0F6E56">「送信済み」バナーを表示</text>
<line x1="340" y1="282" x2="340" y2="300" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,304 336,296 344,296" fill="#555555"/>

<!-- 入力フォーム -->
<rect x="210" y="304" width="260" height="80" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="340" y="324" font-size="13" font-weight="bold" text-anchor="middle" fill="#085041">日程を入力・編集</text>
<text x="340" y="342" font-size="11" text-anchor="middle" fill="#0F6E56">名前選択 / 日付 / 時間（+75分自動）</text>
<text x="340" y="358" font-size="11" text-anchor="middle" fill="#0F6E56">期間外・08:00〜21:00外はエラー</text>
<text x="340" y="374" font-size="10" text-anchor="middle" fill="#0F6E56">行の追加・削除が可能</text>
<line x1="340" y1="384" x2="340" y2="402" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,406 336,398 344,398" fill="#555555"/>

<!-- 3ステップボタン -->
<rect x="210" y="406" width="260" height="80" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="340" y="426" font-size="13" font-weight="bold" text-anchor="middle" fill="#085041">保存 → 完了 → 送信</text>
<text x="340" y="444" font-size="11" font-weight="bold" text-anchor="middle" fill="#1A7A5E">【保存】一時保存（青点灯）</text>
<text x="340" y="460" font-size="11" font-weight="bold" text-anchor="middle" fill="#1A7A5E">【完了】入力確認（送信ボタン活性）</text>
<text x="340" y="476" font-size="11" font-weight="bold" text-anchor="middle" fill="#3C3489">【送信】データ送信 → 上書き保存</text>
<line x1="340" y1="486" x2="340" y2="504" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,508 336,500 344,500" fill="#555555"/>

<!-- 送信完了 + メール -->
<rect x="210" y="508" width="260" height="52" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="340" y="529" font-size="13" font-weight="bold" text-anchor="middle" fill="#085041">送信完了</text>
<text x="340" y="547" font-size="11" text-anchor="middle" fill="#0F6E56">入力結果を本人にメール自動送信</text>
<line x1="340" y1="560" x2="340" y2="578" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,582 336,574 344,574" fill="#555555"/>

<!-- 判断: 変更する? -->
<polygon points="340,582 422,622 340,662 258,622" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="340" y="616" font-size="12" font-weight="bold" text-anchor="middle" fill="#712B13">変更する？</text>
<!-- No → END -->
<text x="350" y="680" font-size="11" fill="#555555">No</text>
<line x1="340" y1="662" x2="340" y2="694" stroke="#555555" stroke-width="1.5"/>
<polygon points="340,698 336,690 344,690" fill="#555555"/>
<!-- Yes → リセット or 再編集 -->
<text x="466" y="608" font-size="10" fill="#3C3489">Yes（修正・リセット）</text>
<line x1="422" y1="622" x2="502" y2="622" stroke="#3C3489" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="502" y1="622" x2="502" y2="350" stroke="#3C3489" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="502" y1="350" x2="472" y2="350" stroke="#3C3489" stroke-width="1" stroke-dasharray="3 2"/>
<polygon points="470,350 478,346 478,354" fill="#3C3489"/>
<text x="542" y="488" font-size="10" fill="#3C3489" text-anchor="middle">再編集</text>
<text x="542" y="500" font-size="10" fill="#3C3489" text-anchor="middle">または</text>
<text x="542" y="512" font-size="10" fill="#3C3489" text-anchor="middle">リセット</text>

<!-- END -->
<rect x="255" y="698" width="170" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
<text x="340" y="720" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C2C2A">ゼネラルフローへ戻る</text>

<text x="340" y="778" font-size="10" text-anchor="middle" fill="#BBBBBB">LV 1on1 — コーチUIフロー v1　© 2026 Toshihisa Nakamura</text>
</svg>