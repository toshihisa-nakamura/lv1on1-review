<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日程予約</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --a:#D4720A;--a2:#FEF3E6;--a3:#F5C98A;
  --n:#0F1B35;--s:#F2F1EE;--st:#C8C5BC;
  --i:#1C1C1E;--i2:#6B6B70;
  --g:#1A7A5E;--g2:#E6F7F3;--g3:#A0D8CE;
  --r:#D93025;--r2:#FEE8E6;
  --w:#FFFFFF;
  --sb:env(safe-area-inset-bottom,16px);
}
html,body{background:var(--s);color:var(--i);font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:16px;-webkit-tap-highlight-color:transparent}

/* HEADER */
.hdr{background:var(--n);color:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:50}
.hdr-title{font-size:17px;font-weight:700;margin-bottom:3px}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.55)}

/* BODY */
.body{padding:14px 12px 130px}

/* STEP INDICATOR */
.steps{display:flex;gap:0;margin-bottom:16px;background:var(--w);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.step{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;color:var(--st);border-right:1px solid var(--s);position:relative}
.step:last-child{border-right:none}
.step.done{color:var(--g)}
.step.active{color:var(--n)}
.step.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--a)}
.step-n{font-size:10px;opacity:.6;margin-bottom:2px}

/* CARD */
.card{background:var(--w);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-lbl{font-size:11px;font-weight:700;color:var(--i2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}

/* INPUTS */
.f-input{height:50px;width:100%;padding:0 14px;border:1.5px solid #DDD;border-radius:10px;font-size:16px;font-family:inherit;color:var(--n);background:var(--w);transition:border-color .15s;margin-bottom:10px}
.f-input:last-child{margin-bottom:0}
.f-input:focus{outline:none;border-color:var(--a)}
.f-input.filled{border-color:var(--a3);background:var(--a2)}
.f-lbl{font-size:11px;font-weight:700;color:var(--i2);letter-spacing:.5px;margin-bottom:5px;display:block}

/* SLOT */
.slots{display:flex;flex-direction:column;gap:8px}
.slot{display:flex;align-items:center;padding:16px 14px;border-radius:12px;border:1.5px solid #E0DDD8;background:var(--s);cursor:pointer;gap:12px;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.slot:active{transform:scale(.98)}
.slot.sel{border-color:var(--a);background:var(--a2);box-shadow:0 0 0 3px rgba(212,114,10,.1)}
.slot.booked{opacity:.35;pointer-events:none;background:#EDEBE8;border-color:#DDD}

.s-radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--st);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.slot.sel .s-radio{border-color:var(--a);background:var(--a)}
.s-dot{width:8px;height:8px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s}
.slot.sel .s-dot{opacity:1}

.s-info{flex:1;min-width:0}
.s-date{font-size:13px;font-weight:700;color:var(--n);margin-bottom:4px}
.s-time{font-size:18px;font-weight:700;color:var(--i);letter-spacing:-.3px}
.s-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.s-badge.open{background:var(--g2);color:var(--g);border:1px solid var(--g3)}
.s-badge.taken{background:#EDEBE8;color:var(--st)}

/* SYNC NOTICE */
.sync-notice{background:#EEF0F9;border:1px solid #C5CCEE;border-radius:10px;padding:10px 14px;font-size:12px;color:#3D5A99;margin-bottom:12px;display:none;align-items:center;gap:8px}
.sync-notice.show{display:flex}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#3D5A99;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ERROR */
.err-box{background:var(--r2);border:1px solid #F7C1C1;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--r);margin-bottom:12px;display:none;line-height:1.5}
.err-box.show{display:block}

/* CONFIRM */
.confirm{background:var(--a2);border:1.5px solid var(--a3);border-radius:12px;padding:16px;margin-bottom:12px;display:none}
.confirm.show{display:block}
.confirm-lbl{font-size:11px;font-weight:700;color:var(--a);letter-spacing:.8px;margin-bottom:8px}
.confirm-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.confirm-key{font-size:11px;color:var(--i2);white-space:nowrap;min-width:40px}
.confirm-val{font-size:15px;font-weight:700;color:var(--n)}
.confirm-note{font-size:11px;color:var(--i2);margin-top:8px;padding-top:8px;border-top:1px solid var(--a3)}

/* FOOTER */
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid #E8E8E8;padding:12px 12px calc(12px + var(--sb));z-index:100}
.submit-btn{width:100%;height:56px;background:var(--a);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.submit-btn:active:not(:disabled){transform:scale(.98);background:#B85E06}
.submit-btn:disabled{background:var(--st);cursor:not-allowed}
.submit-btn.sending{background:#888;pointer-events:none}

/* SPINNER */
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.ov-box{background:var(--w);border-radius:20px;padding:36px 24px;text-align:center;width:100%;max-width:320px}
.ov-icon{font-size:52px}
.ov-title{font-size:22px;font-weight:700;color:var(--n);margin:12px 0 8px}
.ov-detail{font-size:14px;color:var(--i2);line-height:1.8;margin-bottom:12px}
.ov-email{background:var(--g2);border:1px solid var(--g3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--g);font-weight:600;margin-bottom:8px}
.ov-note{font-size:12px;color:var(--st)}
.ov-tag{display:inline-block;margin-top:12px;padding:4px 14px;background:#FEF3E6;border-radius:20px;font-size:11px;font-weight:700;color:#8A4B0A}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">📆 日程予約</div>
  <div class="hdr-sub">LV コーチング 2026春</div>
</div>

<div class="body">

  <!-- STEP -->
  <div class="steps">
    <div class="step active" id="step1"><div class="step-n">STEP 1</div>情報入力</div>
    <div class="step" id="step2"><div class="step-n">STEP 2</div>日程選択</div>
    <div class="step" id="step3"><div class="step-n">STEP 3</div>確認・送信</div>
  </div>

  <!-- STEP1: 受講者情報 -->
  <div class="card" id="cardInfo">
    <div class="card-lbl">受講者情報</div>
    <label class="f-lbl">LN番号（LN）</label>
    <input type="text" class="f-input" id="ln" placeholder="例：299" inputmode="numeric" oninput="onInput()">
    <label class="f-lbl">お名前</label>
    <input type="text" class="f-input" id="uname" placeholder="例：山田 太郎" oninput="onInput()">
    <label class="f-lbl">メールアドレス</label>
    <input type="email" class="f-input" id="email" placeholder="例：taro@example.com" inputmode="email" oninput="onInput()">
  </div>

  <!-- ERR -->
  <div class="err-box" id="errBox"></div>

  <!-- SYNC NOTICE -->
  <div class="sync-notice" id="syncNotice">
    <div class="sync-dot"></div>
    <span>空き枠を更新しています...</span>
  </div>

  <!-- STEP2: 枠選択 -->
  <div class="card" id="cardSlots">
    <div class="card-lbl">希望日程（1つ選択）</div>
    <div class="slots" id="slotList"></div>
  </div>

  <!-- STEP3: 確認 -->
  <div class="confirm" id="confirmBox">
    <div class="confirm-lbl">予約内容の確認</div>
    <div class="confirm-row">
      <span class="confirm-key">日時</span>
      <span class="confirm-val" id="cv-date"></span>
    </div>
    <div class="confirm-row">
      <span class="confirm-key">時間</span>
      <span class="confirm-val" id="cv-time"></span>
    </div>
    <div class="confirm-row">
      <span class="confirm-key">名前</span>
      <span class="confirm-val" id="cv-name"></span>
    </div>
    <div class="confirm-row">
      <span class="confirm-key">LN</span>
      <span class="confirm-val" id="cv-ln"></span>
    </div>
    <div class="confirm-row">
      <span class="confirm-key">メール</span>
      <span class="confirm-val" id="cv-email" style="font-size:13px;word-break:break-all"></span>
    </div>
    <div class="confirm-note">送信すると予約が確定します。変更はセンタースタッフにご連絡ください。</div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <button class="submit-btn" id="submitBtn" disabled onclick="doSubmit()">
    <div class="spin" id="spin"></div>
    <span id="submitLbl">この日程で予約する →</span>
  </button>
</div>

<!-- DONE OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-box">
    <div class="ov-icon">✅</div>
    <div class="ov-title">予約完了！</div>
    <div class="ov-detail" id="ovDetail"></div>
    <div class="ov-email" id="ovEmail"></div>
    <div class="ov-note">このページを閉じてください。</div>
    <div class="ov-tag">※ これはデモです</div>
  </div>
</div>

<script>
// ===== デモ用サンプル枠データ =====
var SLOTS = [
  {id:'S001',date:'2026/04/22',w:'水',st:'09:00',et:'10:15',taken:false},
  {id:'S002',date:'2026/04/23',w:'木',st:'15:15',et:'16:30',taken:false},
  {id:'S003',date:'2026/04/23',w:'木',st:'20:30',et:'21:45',taken:true},  // 予約済みのデモ
  {id:'S004',date:'2026/04/24',w:'金',st:'11:00',et:'12:15',taken:false},
  {id:'S005',date:'2026/04/25',w:'土',st:'10:00',et:'11:15',taken:false},
  {id:'S006',date:'2026/04/26',w:'日',st:'19:30',et:'20:45',taken:false},
  {id:'S007',date:'2026/05/01',w:'金',st:'10:00',et:'11:15',taken:false},
  {id:'S008',date:'2026/05/03',w:'日',st:'14:00',et:'15:15',taken:false},
  {id:'S009',date:'2026/05/06',w:'水',st:'16:45',et:'18:00',taken:false},
  {id:'S010',date:'2026/05/07',w:'木',st:'09:00',et:'10:15',taken:false},
];

var selected = null;

// ===== 枠描画 =====
function renderSlots(slots) {
  var wrap = document.getElementById('slotList');
  wrap.innerHTML = '';
  slots.forEach(function(s) {
    var p = s.date.split('/');
    var dateStr = p[1]+'/'+p[2]+'（'+s.w+'）';
    var div = document.createElement('div');
    div.className = 'slot' + (s.taken ? ' booked' : '');
    div.dataset.id = s.id;
    div.innerHTML =
      '<div class="s-radio"><div class="s-dot"></div></div>'+
      '<div class="s-info">'+
        '<div class="s-date">'+dateStr+'</div>'+
        '<div class="s-time">'+s.st+' 〜 '+s.et+'</div>'+
      '</div>'+
      '<div class="s-badge '+(s.taken?'taken':'open')+'">'+(s.taken?'予約済':'空き')+'</div>';
    if (!s.taken) {
      div.addEventListener('click', function(){ selectSlot(this, s); });
    }
    wrap.appendChild(div);
  });
}
renderSlots(SLOTS);

// ===== 枠選択 =====
function selectSlot(el, s) {
  // 入力チェック
  if (!validateInfo()) return;

  document.querySelectorAll('.slot').forEach(function(c){ c.classList.remove('sel'); });
  el.classList.add('sel');
  selected = s;

  // STEP更新
  setStep(3);

  // 確認ボックス
  var p = s.date.split('/');
  document.getElementById('cv-date').textContent = p[1]+'月'+p[2]+'日（'+s.w+'）';
  document.getElementById('cv-time').textContent = s.st+' 〜 '+s.et;
  document.getElementById('cv-name').textContent = document.getElementById('uname').value.trim();
  document.getElementById('cv-ln').textContent   = document.getElementById('ln').value.trim();
  document.getElementById('cv-email').textContent = document.getElementById('email').value.trim();

  var cb = document.getElementById('confirmBox');
  cb.classList.add('show');
  cb.scrollIntoView({behavior:'smooth', block:'nearest'});

  document.getElementById('submitBtn').disabled = false;
}

// ===== 入力チェック =====
function validateInfo() {
  var ln  = document.getElementById('ln').value.trim();
  var nm  = document.getElementById('uname').value.trim();
  var em  = document.getElementById('email').value.trim();
  if (!ln)  { showErr('LN番号を入力してください'); document.getElementById('ln').focus(); return false; }
  if (!nm)  { showErr('お名前を入力してください'); document.getElementById('uname').focus(); return false; }
  if (!em || !em.includes('@')) { showErr('正しいメールアドレスを入力してください'); document.getElementById('email').focus(); return false; }
  hideErr();
  return true;
}

function onInput() {
  var ln  = document.getElementById('ln').value.trim();
  var nm  = document.getElementById('uname').value.trim();
  var em  = document.getElementById('email').value.trim();
  if(ln)  document.getElementById('ln').classList.add('filled');
  else    document.getElementById('ln').classList.remove('filled');
  if(nm)  document.getElementById('uname').classList.add('filled');
  else    document.getElementById('uname').classList.remove('filled');
  if(em)  document.getElementById('email').classList.add('filled');
  else    document.getElementById('email').classList.remove('filled');
  if(ln && nm && em.includes('@')) setStep(2);
  else setStep(1);
  // 選択リセット
  selected = null;
  document.querySelectorAll('.slot').forEach(function(c){ c.classList.remove('sel'); });
  document.getElementById('confirmBox').classList.remove('show');
  document.getElementById('submitBtn').disabled = true;
}

// ===== 送信 =====
function doSubmit() {
  if (!validateInfo() || !selected) return;

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('sending');
  document.getElementById('spin').style.display = 'block';
  document.getElementById('submitLbl').textContent = '送信中...';

  // ===== 実際のGAS呼び出し =====
  // google.script.run
  //   .withSuccessHandler(onSubmitResult)
  //   .withFailureHandler(onSubmitError)
  //   .submitClientBooking({
  //     slotId: selected.id,
  //     ln: document.getElementById('ln').value.trim(),
  //     name: document.getElementById('uname').value.trim(),
  //     email: document.getElementById('email').value.trim()
  //   });

  // ===== デモ：1.2秒後に結果をシミュレート =====
  setTimeout(function() {
    // デモでは「成功」をシミュレート
    // 衝突テストの場合は success:false を返す
    var result = { success: true };
    onSubmitResult(result);
  }, 1200);
}

function onSubmitResult(result) {
  document.getElementById('spin').style.display = 'none';

  if (result.success) {
    // 成功 → 完了オーバーレイ
    var p = selected.date.split('/');
    var detail = p[1]+'月'+p[2]+'日（'+selected.w+'）\n'+selected.st+' 〜 '+selected.et;
    document.getElementById('ovDetail').textContent = detail;
    document.getElementById('ovEmail').textContent =
      '✉ 確認メールを送信しました\n'+document.getElementById('email').value.trim();
    document.getElementById('overlay').classList.add('show');
  } else {
    // 失敗 → 衝突エラー → 枠リストを再取得して選び直し
    showErr('⚠ この枠はたった今他の方に予約されました。\n別の日程を選んでください。');
    // 送信済みの枠を「予約済」に更新
    SLOTS.forEach(function(s){ if(s.id===selected.id) s.taken=true; });
    selected = null;
    document.getElementById('confirmBox').classList.remove('show');
    document.getElementById('submitBtn').disabled = true;

    // 同期アニメ表示
    var sn = document.getElementById('syncNotice');
    sn.classList.add('show');
    setTimeout(function(){
      renderSlots(SLOTS); // 最新枠を再描画
      sn.classList.remove('show');
    }, 800);

    var btn = document.getElementById('submitBtn');
    btn.classList.remove('sending');
    btn.textContent = 'この日程で予約する →';
    setStep(2);
  }
}

function onSubmitError(e) {
  showErr('通信エラーが発生しました。もう一度お試しください。\n('+e.message+')');
  var btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.classList.remove('sending');
  document.getElementById('spin').style.display = 'none';
  document.getElementById('submitLbl').textContent = 'この日程で予約する →';
}

// ===== STEP表示 =====
function setStep(n) {
  [1,2,3].forEach(function(i){
    var el = document.getElementById('step'+i);
    el.classList.remove('active','done');
    if(i < n) el.classList.add('done');
    if(i === n) el.classList.add('active');
  });
}

function showErr(m){
  var el=document.getElementById('errBox');
  el.textContent=m; el.classList.add('show');
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function hideErr(){ document.getElementById('errBox').classList.remove('show'); }
</script>
</body>
</html>
